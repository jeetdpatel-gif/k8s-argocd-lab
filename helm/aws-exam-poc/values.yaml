# Default values for AWS Exam POC Helm chart
# Update these in Harness pipeline or ArgoCD App values overrides

replicaCount: 1

image:
  repository: 729598251506.dkr.ecr.ap-south-1.amazonaws.com/k8s-argocd-lab # Change to yourusername/aws-exam-poc:latest
  pullPolicy: IfNotPresent
  tag: "k8s-argocd-lab-28"  # Use :latest for POC

imagePullSecrets:
  - name: aws-ecr-secret

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext: {}
# fsGroup: 2000

securityContext: {}
# capabilities:
#   add: ["NET_BIND_SERVICE"]
#   drop: ["ALL"]
readOnlyRootFilesystem: true
runAsNonRoot: true
runAsUser: 101  # nginx user

service:
  type: LoadBalancer  # or NodePort/ClusterIP
  port: 80

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Harness/ArgoCD Secrets Config
secrets:
  enabled: true
  appSecretName: "poc-app-secret"  # Harness SecretSet → K8s Secret
  # In Harness: Create Secret 'poc-app-secret' with value 'supersecret123!@#'
  # ArgoCD syncs via Harness Connector

# Environment variables from secret
env:
  APP_SECRET: "{{ .Values.secrets.appSecretName }}:APP_SECRET"  # Ref format for external secret mgmt
  HARNESS_ENV: "production"

# Extra volumes/mounts
extraVolumes: []
extraVolumeMounts: []

# Health check probes
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
